<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#2d6be4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="えらポ！">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>えらポイントカード</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden; /* no scroll — everything fits on screen */
  }

  body {
    background: #2d6be4;
    display: flex;
    flex-direction: column;
    height: 100dvh;
    font-family: 'Nunito', sans-serif;
    padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px) env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 0px);
  }

  /* ナビゲーションバー下の白を完全に塞ぐ */
  body::after {
    content: '';
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: env(safe-area-inset-bottom, 40px);
    background: #2d6be4;
    z-index: 0;
  }
  .save-toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: #1a4fc4;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 8px 20px;
    border-radius: 99px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    transition: transform 0.3s ease;
    z-index: 9999;
    white-space: nowrap;
  }
  .save-toast.show { transform: translateX(-50%) translateY(0); }

  /* ── Card — fills the whole screen ── */
  .card {
    flex: 1;
    width: 100%;
    background: #2d6be4;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #1a4fc4 0%, #2d6be4 55%, #0ea5e9 100%);
    padding: 16px 16px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px; /* 隙間を広く */
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -20px; right: -20px;
    width: 80px; height: 80px;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
  }
  .title-block h1 {
    color: #fff;
    font-size: 26px; /* 大きく目立つ */
    font-weight: 900;
    letter-spacing: 2px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.25);
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.18);
    border-radius: 8px;
    padding: 6px 14px;
    width: 70%;
  }
  .field-label {
    color: rgba(255,255,255,0.9);
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
  }
  .field-input {
    flex: 1;
    min-width: 0;
    background: transparent;
    border: none;
    border-bottom: 1.5px dashed rgba(255,255,255,0.7);
    color: #fff;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    outline: none;
    padding: 2px 4px;
  }
  .field-input::placeholder { color: rgba(255,255,255,0.4); }

  /* ── Progress bar ── */
  .progress-section {
    background: #dce8ff;
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .progress-label { font-size: 12px; font-weight: 700; color: #2d6be4; white-space: nowrap; }
  .progress-bar-bg { flex: 1; height: 14px; background: #b8cef7; border-radius: 99px; overflow: hidden; }
  .progress-bar-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #2d6be4, #0ea5e9);
    border-radius: 99px;
    transition: width 0.4s ease;
  }
  .progress-num { font-size: 12px; font-weight: 900; color: #1a4fc4; white-space: nowrap; min-width: 44px; text-align: right; }

  /* Grid — 10個ごとにグループ化 */
  .grid-section {
    padding: 22px 10px 22px;
    display: flex; flex-direction: column;
    justify-content: flex-start;
    gap: 8px;
    background: #fff;
  }
  .grid-row {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 4px;
    width: 100%;
  }

  .cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    cursor: pointer;
    user-select: none;
  }
  .cell-num {
    font-size: 15px;
    font-weight: 900;
    color: #93a8d4;
    line-height: 1;
    pointer-events: none;
  }
  .cell.filled    .cell-num { color: #2d6be4; }
  .cell.milestone .cell-num { color: #f59e0b; }
  .cell.locked    .cell-num { color: #c8d8f0; }

  .stamp {
    aspect-ratio: 1;
    width: 100%;
    border-radius: 6px;
    border: 1.5px dashed #b8cef7;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.12s, border-color 0.12s, background 0.12s, opacity 0.12s;
    position: relative;
    background: #f4f8ff;
    overflow: hidden;
    pointer-events: none;
  }
  .cell.locked { opacity: 0.32; cursor: not-allowed; }
  .cell.locked:hover .stamp { transform: none !important; }
  .cell:not(.locked):not(.filled):hover .stamp { transform: scale(1.08); border-color: #2d6be4; background: #eef3ff; }
  .cell.filled .stamp {
    border: 1.5px solid #2d6be4;
    background: linear-gradient(135deg, #e8f0fe, #d4e3ff);
    animation: pop 0.25s cubic-bezier(.36,1.5,.5,1) forwards;
  }
  @keyframes pop { 0% { transform: scale(0.4); } 100% { transform: scale(1); } }
  .cell.milestone .stamp { border-color: #f59e0b; background: #fffbeb; }
  .cell.milestone.filled .stamp { background: linear-gradient(135deg, #fef3c7, #fde68a); border-color: #f59e0b; }

  .stamp .emoji {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 30px; line-height: 1; pointer-events: none;
  }

  /* ── Footer ── */
  .footer {
    background: linear-gradient(135deg, #fef3c7, #fde68a);
    border-top: 2px solid #fbbf24;
    border-bottom: 2px solid #fbbf24;
    padding: 10px 16px;
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0;
  }
  .trophy { font-size: 24px; flex-shrink: 0; }
  .reward-label-text { font-size: 13px; font-weight: 900; color: #92400e; white-space: nowrap; flex-shrink: 0; }
  .reward-input {
    flex: 1; min-width: 0;
    background: rgba(255,255,255,0.55);
    border: none; border-bottom: 1.5px dashed #fbbf24;
    border-radius: 3px 3px 0 0;
    color: #92400e; font-family: inherit; font-size: 14px; font-weight: 700;
    outline: none; padding: 3px 6px;
  }
  .reward-input::placeholder { color: #d9a843; }

  /* ── Controls ── */
  .controls {
    display: flex;
    gap: 8px;
    justify-content: center;
    align-items: center;
    padding: 14px 16px;
    background: #2d6be4;
    border-bottom: 2px solid rgba(255,255,255,0.25);
    flex-shrink: 0;
  }

  /* ── Road animation ── */
  .road-section {
    background: #2d6be4;
    padding: 0 0;
    padding-bottom: max(14px, env(safe-area-inset-bottom));
    flex-shrink: 0;
  }
  .road {
    position: relative;
    height: 44px;
    background: #374151;
    overflow: hidden;
    display: flex;
    align-items: center;
  }
  .road-line {
    position: absolute;
    top: 50%; left: 0;
    width: 200%; height: 4px; margin-top: -2px;
    background: repeating-linear-gradient(
      90deg,
      #fff 0px, #fff 20px,
      transparent 20px, transparent 40px
    );
    animation: road-scroll 0.6s linear infinite; /* 常時スクロール */
  }
  @keyframes road-scroll {
    from { transform: translateX(0); }
    to   { transform: translateX(-40px); }
  }

  .road-car {
    position: absolute;
    left: -70px;
    font-size: 50px;
    line-height: 1;
    top: 50%;
    transform: translateY(-75%) scaleX(-1);
    opacity: 0;
  }
  .road.running .road-car {
    opacity: 1;
    animation: car-run 1.4s linear forwards;
  }
  @keyframes car-run {
    0%   { left: -70px; transform: translateY(-75%) scaleX(-1); }
    100% { left: 110%;  transform: translateY(-75%) scaleX(-1); }
  }

  /* ── History ── */
  .history {
    background: #2d6be4;
    padding: 12px 14px 12px;
    flex-shrink: 0;
  }
  .history-box {
    border: 1.5px solid rgba(255,255,255,0.3);
    border-radius: 10px;
    padding: 8px 10px;
    background: rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
  }
  .history-title {
    font-size: 13px;
    font-weight: 900;
    color: rgba(255,255,255,0.6);
    letter-spacing: 1px;
    margin-bottom: 6px;
    flex-shrink: 0;
  }
  .history-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    /* 3件分の高さを固定: 1件=24px × 3 + gap=6px × 2 = 84px */
    min-height: 84px;
  }
  .history-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    font-weight: 700;
    color: rgba(255,255,255,0.8);
    height: 24px;
    flex-shrink: 0;
  }
  .history-item .h-emoji { font-size: 16px; }
  .history-item .h-num   { color: #fbbf24; min-width: 44px; }
  .history-item .h-time  { color: rgba(255,255,255,0.55); font-size: 12px; }
  .history-empty {
    font-size: 13px;
    font-weight: 700;
    color: rgba(255,255,255,0.35);
    text-align: center;
    padding: 28px 0;
  }
  .btn {
    border-radius: 99px; border: none;
    cursor: pointer; font-family: inherit; font-weight: 700;
    transition: transform 0.1s; touch-action: manipulation;
  }
  .btn:active { transform: scale(0.95); }
  .btn-main {
    /* ＋ポイント！— 一番大きく */
    padding: 14px 28px;
    font-size: 17px;
    flex: 2;
    background: linear-gradient(135deg, #f59e0b, #fbbf24);
    color: #fff;
    box-shadow: 0 4px 14px rgba(245,158,11,0.45);
  }
  .btn-reset {
    padding: 11px 14px;
    font-size: 13px;
    flex: 1;
    background: #f1f5f9; color: #64748b;
  }
  .btn-print {
    padding: 11px 14px;
    font-size: 13px;
    flex: 1;
    background: linear-gradient(135deg, #059669, #10b981); color: #fff;
    box-shadow: 0 3px 10px rgba(5,150,105,0.3);
  }

  /* ── Celebrate ── */
  .celebrate {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    justify-content: center; align-items: center;
    z-index: 999; backdrop-filter: blur(3px);
  }
  .celebrate.show { display: flex; }
  .celebrate-box {
    background: #fff; border-radius: 24px; padding: 36px 44px;
    text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    animation: bounce-in 0.4s cubic-bezier(.36,1.5,.5,1); max-width: 300px;
  }
  @keyframes bounce-in { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .celebrate-emoji { font-size: 72px; }
  .celebrate-box h2 { font-size: 24px; color: #1a4fc4; margin: 10px 0 8px; font-weight: 900; }
  .celebrate-box p  { font-size: 14px; color: #64748b; font-weight: 700; }
  .celebrate-box .btn { margin-top: 18px; padding: 10px 30px; font-size: 14px; }

  @media print {
    @page { size: 100mm 148mm; margin: 0; }
    html, body { height: auto; overflow: visible; background: white; }
    .controls, .celebrate, .save-toast { display: none !important; }
    .card { width: 100mm; height: 148mm; border-radius: 0; box-shadow: none; border: none; }
    .grid { grid-template-rows: repeat(5, 32px); }
    .stamp { height: 32px; cursor: default; }
    .stamp.locked { opacity: 1; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="title-block">
      <h1><span>🚒</span>えらポイントカード<span>🚓</span></h1>
    </div>
    <div class="header-right">
      <span class="field-label">なまえ：</span>
      <input class="field-input" id="nameInput" type="text" placeholder="ここにかいてね" maxlength="16">
    </div>
  </div>

  <div class="progress-section">
    <span class="progress-label">🎯 しんちょく</span>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <span class="progress-num" id="progressNum">0 / 50</span>
  </div>

  <div class="grid-section" id="stampGrid"></div>

  <div class="footer">
    <div class="trophy">🏆</div>
    <span class="reward-label-text">ごほうび：</span>
    <input class="reward-input" id="rewardInput" type="text" placeholder="ここにかいてね" maxlength="20">
  </div>

  <div class="controls">
    <button class="btn btn-reset"  onclick="resetCard()">リセット</button>
    <button class="btn btn-main"   onclick="addStamp()">＋ ポイント！</button>
    <button class="btn btn-print"  onclick="window.print()">🖨️ 印刷</button>
  </div>

  <div class="history">
    <div class="history-box">
      <div class="history-title">📋 ポイント獲得履歴</div>
      <div class="history-list" id="historyList">
        <div class="history-empty">まだポイントがないよ！</div>
      </div>
    </div>
  </div>

  <div class="road-section">
    <div class="road" id="road">
      <div class="road-line"></div>
      <div class="road-car" id="roadCar">🚗</div>
    </div>
  </div>
</div>

<div class="celebrate" id="celebrate">
  <div class="celebrate-box">
    <div class="celebrate-emoji">😊</div>
    <h2>やったー！！</h2>
    <p>50こ ぜんぶ あつまったよ！<br>すごい！！ごほうびだー！</p>
    <button class="btn btn-main" onclick="closeCelebrate()">もどる</button>
  </div>
</div>

<div class="save-toast" id="saveToast">💾 じどうほぞんしました</div>

<script>
  const vehicleEmojis = ['🚗','🚕','🚙','🚌','🚎','🏎️','🚐','🚑','🚒','🚓','🚁','🚂','🚃','🚄','🚅','🚈','🚢','⛵','🚗','🚕','🚙','🚌','🚎','🏎️','🚐','🚑','🚒','🚓','🚁','🚂','🚃','🚄','🚅','🚈','🚢','⛵','🚗','🚕','🚙','🚌','🚎','🏎️','🚐','🚑','🚒','🚓','🚁','🚂','🚃','🚄'];
  const TOTAL = 50;
  const milestones = new Set([10, 20, 30, 40, 50]);
  let filled = 0;
  let saveTimer = null;
  let history = []; // {num, emoji, time}

  // ── LocalStorage keys ──
  const KEY_FILLED  = 'eracard_filled';
  const KEY_NAME    = 'eracard_name';
  const KEY_REWARD  = 'eracard_reward';
  const KEY_HISTORY = 'eracard_history';

  function formatTime(iso) {
    const d = new Date(iso);
    const yyyy = d.getFullYear();
    const mm   = String(d.getMonth()+1).padStart(2,'0');
    const dd   = String(d.getDate()).padStart(2,'0');
    const hh   = String(d.getHours()).padStart(2,'0');
    const min  = String(d.getMinutes()).padStart(2,'0');
    return yyyy + '/' + mm + '/' + dd + ' ' + hh + ':' + min;
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    if (history.length === 0) {
      list.innerHTML = '<div class="history-empty">まだポイントがないよ！</div>';
      return;
    }
    const recent = history.slice(-3).reverse();
    list.innerHTML = recent.map(h =>
      `<div class="history-item">
        <span class="h-emoji">${h.emoji}</span>
        <span class="h-num">No.${h.num}</span>
        <span class="h-time">${formatTime(h.time)}</span>
      </div>`
    ).join('');
  }

  function saveState() {
    try {
      localStorage.setItem(KEY_FILLED, filled);
      localStorage.setItem(KEY_NAME,   document.getElementById('nameInput').value);
      localStorage.setItem(KEY_REWARD, document.getElementById('rewardInput').value);
      localStorage.setItem(KEY_HISTORY, JSON.stringify(history));
      showToast();
    } catch(e) {}
  }

  function loadState() {
    try {
      const savedFilled  = parseInt(localStorage.getItem(KEY_FILLED) || '0');
      const savedName    = localStorage.getItem(KEY_NAME)    || '';
      const savedReward  = localStorage.getItem(KEY_REWARD)  || '';
      const savedHistory = localStorage.getItem(KEY_HISTORY);
      document.getElementById('nameInput').value   = savedName;
      document.getElementById('rewardInput').value = savedReward;
      if (savedHistory) history = JSON.parse(savedHistory);
      // restore stamps silently
      for (let i = 1; i <= savedFilled; i++) {
        const el = document.getElementById('stamp-' + i);
        if (!el) continue;
        el.classList.remove('locked');
        el.classList.add('filled');
        const stamp = el.querySelector('.stamp');
        const emojiEl = document.createElement('span');
        emojiEl.className = 'emoji';
        emojiEl.textContent = getEmoji(i);
        stamp.appendChild(emojiEl);
        if (i < TOTAL) {
          const next = document.getElementById('stamp-' + (i + 1));
          if (next) next.classList.remove('locked');
        }
      }
      filled = savedFilled;
      updateUI();
      renderHistory();
    } catch(e) {}
  }

  function showToast() {
    const t = document.getElementById('saveToast');
    t.classList.add('show');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => t.classList.remove('show'), 1800);
  }

  function buildGrid() {
    const section = document.getElementById('stampGrid');
    section.innerHTML = '';
    for (let row = 0; row < 5; row++) {
      const rowEl = document.createElement('div');
      rowEl.className = 'grid-row';
      for (let col = 0; col < 10; col++) {
        const i = row * 10 + col + 1;
        const cell = document.createElement('div');
        cell.className = 'cell'
          + (milestones.has(i) ? ' milestone' : '')
          + (i === 1 ? '' : ' locked');
        cell.id = 'stamp-' + i;
        cell.onclick = () => handleClick(i);

        const num = document.createElement('div');
        num.className = 'cell-num';
        num.textContent = i;

        const stamp = document.createElement('div');
        stamp.className = 'stamp';

        cell.appendChild(num);
        cell.appendChild(stamp);
        rowEl.appendChild(cell);
      }
      section.appendChild(rowEl);
    }
  }

  function getEmoji(i) {
    if (milestones.has(i)) return '⭐';
    return vehicleEmojis[(i - 1) % vehicleEmojis.length];
  }

  function handleClick(i) {
    const el = document.getElementById('stamp-' + i);
    if (el.classList.contains('locked')) return;
    if (el.classList.contains('filled')) {
      if (i !== filled) return;
      removeStamp(i);
    } else {
      if (i !== filled + 1) return;
      addStampAt(i);
    }
  }

  function runCar(emoji) {
    const road = document.getElementById('road');
    const car  = document.getElementById('roadCar');
    car.textContent = '🚗'; // 常に🚗
    road.classList.remove('running');
    void road.offsetWidth;
    road.classList.add('running');
    setTimeout(() => road.classList.remove('running'), 1300);
  }

  function addStampAt(i) {
    const el = document.getElementById('stamp-' + i);
    el.classList.add('filled');
    const stamp = el.querySelector('.stamp');
    const emojiEl = document.createElement('span');
    emojiEl.className = 'emoji';
    const emoji = getEmoji(i);
    emojiEl.textContent = emoji;
    stamp.appendChild(emojiEl);
    filled = i;
    // 履歴に追加（直近3件まで）
    history.push({ num: i, emoji: emoji, time: new Date().toISOString() });
    if (history.length > 3) history.shift();
    // 車を走らせる
    runCar(emoji);
    if (i < TOTAL) document.getElementById('stamp-' + (i + 1)).classList.remove('locked');
    if (filled === TOTAL) setTimeout(() => document.getElementById('celebrate').classList.add('show'), 400);
    updateUI();
    renderHistory();
    saveState();
  }

  function removeStamp(i) {
    const el = document.getElementById('stamp-' + i);
    el.classList.remove('filled');
    const emojiEl = el.querySelector('.emoji');
    if (emojiEl) emojiEl.remove();
    // 履歴から最後の1件を削除
    if (history.length > 0) history.pop();
    if (i < TOTAL) document.getElementById('stamp-' + (i + 1)).classList.add('locked');
    filled = i - 1;
    updateUI();
    renderHistory();
    saveState();
  }

  function addStamp() {
    if (filled < TOTAL) addStampAt(filled + 1);
  }

  function resetCard() {
    if (!confirm('リセットしますか？')) return;
    for (let i = 1; i <= TOTAL; i++) {
      const el = document.getElementById('stamp-' + i);
      el.classList.remove('filled');
      const emojiEl = el.querySelector('.emoji');
      if (emojiEl) emojiEl.remove();
      if (i === 1) el.classList.remove('locked');
      else         el.classList.add('locked');
    }
    filled = 0;
    history = [];
    updateUI();
    renderHistory();
    saveState();
  }

  function updateUI() {
    document.getElementById('progressNum').textContent = filled + ' / ' + TOTAL;
    document.getElementById('progressFill').style.width = (filled / TOTAL * 100) + '%';
  }

  function closeCelebrate() {
    document.getElementById('celebrate').classList.remove('show');
  }

  // Auto-save name and reward on input
  document.addEventListener('DOMContentLoaded', () => {
    buildGrid();
    loadState();
    document.getElementById('nameInput').addEventListener('input', saveState);
    document.getElementById('rewardInput').addEventListener('input', saveState);
  });

  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
</script>
</body>
</html>
